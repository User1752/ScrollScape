services:
  # ── Manghu ───────────────────────────────────────────────────
  manghu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: manghu
    ports:
      - "3000:3000"
    volumes:
      - ../data:/app/data
      - ../public:/app/public
    environment:
      - PORT=3000
    restart: unless-stopped
