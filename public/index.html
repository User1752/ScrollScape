<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manghu - Manga Web Reader</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🎌 Manghu</div>
    <nav class="tabs">
      <button class="tab active" data-view="discover">Descobrir</button>
      <button class="tab" data-view="library">Biblioteca</button>
      <!-- Settings button added via JS -->
    </nav>
  </header>

  <main class="container">
    <!-- Discover View -->
    <section id="view-discover" class="view">
      <!-- Left Sidebar: Search + Results -->
      <div class="sidebar-left">
        <div class="search-panel">
          <h3>🔍 Pesquisar Manga</h3>
          <div class="row">
            <select id="sourceSelect" class="input"></select>
          </div>
          <div class="row">
            <input id="searchInput" class="input" placeholder="Digite o nome do manga..." />
            <button id="searchBtn" class="btn">Pesquisar</button>
          </div>
          <div id="searchStatus" class="muted" style="padding:0.5rem 0; text-align:left;"></div>
        </div>

        <div class="results-panel">
          <div id="results" class="muted">Digite o nome de um manga e clique em "Pesquisar"</div>
        </div>
      </div>

      <!-- Right Content: Details + Chapters -->
      <div class="content-right">
        <div class="details-panel">
          <div id="details" class="muted">Selecione um manga dos resultados para ver detalhes</div>
        </div>

        <div class="chapters-panel">
          <div id="chapters" class="muted">Os capítulos aparecerão aqui</div>
        </div>
      </div>
    </section>

    <!-- Library View -->
    <section id="view-library" class="view hidden">
      <div class="sidebar-left">
        <div class="search-panel">
          <h3>⭐ Favoritos</h3>
        </div>
        <div class="results-panel">
          <div id="library" class="muted">Adicione mangas aos favoritos</div>
        </div>
      </div>

      <div class="content-right">
        <div class="search-panel">
          <h3>📜 Histórico de Leitura</h3>
        </div>
        <div style="padding: 1.5rem; overflow-y: auto;">
          <div id="history" class="muted">Seu histórico aparecerá aqui</div>
        </div>
      </div>
    </section>

    <!-- Reader -->
    <div id="reader" class="reader hidden">
      <div class="reader-top">
        <button id="closeReader" class="btn secondary">✕ Fechar</button>
        <div id="readerTitle" class="reader-title"></div>
        <div class="reader-controls">
          <button id="prevPage" class="btn secondary">◀</button>
          <span id="pageCounter"></span>
          <button id="nextPage" class="btn">▶</button>
        </div>
      </div>
      <div id="pageWrap" class="page-wrap"></div>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
