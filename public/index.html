<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manghu - Manga Web Reader</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container-top">
      <div class="brand">🎌 Manghu</div>
      <nav class="nav-menu">
        <a href="#" class="nav-link active">Home</a>
        <a href="#" class="nav-link">Biblioteca</a>
      </nav>
    </div>
  </header>

  <main class="main-container">
    <!-- Discover View -->
    <section id="view-discover" class="view">
      <!-- Search Section -->
      <div class="search-section">
        <div class="search-container">
          <h2>Procurar Mangá</h2>
          <div class="search-form">
            <select id="sourceSelect" class="form-control"></select>
            <input id="searchInput" class="form-control" placeholder="Digite o nome do manga..." />
            <button id="searchBtn" class="btn-search">Pesquisar</button>
          </div>
          <div id="searchStatus" class="search-status"></div>
        </div>
      </div>

      <!-- Advanced Filters Section -->
      <div class="filters-section">
        <div class="filters-container">
          <div class="filters-header">
            <h3>Filtros Avançados</h3>
            <button id="btn-settings" class="btn-settings-inline">⚙️</button>
          </div>
          <div class="filters-grid">
            <div class="filter-group">
              <label>🎭 Gêneros</label>
              <div id="genreFilter" class="genre-filter">
                <div class="genre-chips"></div>
              </div>
            </div>

            <div class="filter-group">
              <label>📊 Status</label>
              <div class="status-filter"></div>
            </div>

            <div class="filter-group">
              <label>📈 Ordenar por</label>
              <select id="sortFilter" class="form-control">
                <option value="relevance">Mais Relevantes</option>
                <option value="trending">Trending</option>
                <option value="views">Mais Visualizados</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Results Grid (AsuraScans style) -->
      <div class="results-section">
        <div id="results" class="results-grid"></div>
      </div>
    </section>

    <!-- Manga Details Page (Full Screen) -->
    <section id="view-manga-details" class="view hidden">
      <div class="manga-page">
        <button id="backBtn" class="btn-back">← Voltar</button>
        
        <div id="details" class="manga-detail-section"></div>
        <div id="chapters" class="chapters-section"></div>
      </div>
    </section>

    <!-- Library View -->
    <section id="view-library" class="view hidden">
      <div class="library-container">
        <div class="library-header">
          <h2>📚 Minha Biblioteca</h2>
          <div class="library-stats">
            <span id="libraryCount">0 mangás</span>
          </div>
        </div>

        <div class="library-grid" id="library"></div>
      </div>
    </section>

    <!-- Reader -->
    <div id="reader" class="reader hidden">
      <div class="reader-header">
        <button id="closeReader" class="btn-close">✕</button>
        <div id="readerTitle" class="reader-title"></div>
        <div class="reader-nav">
          <button id="prevPage" class="btn-nav">◀ Anterior</button>
          <span id="pageCounter" class="page-info"></span>
          <button id="nextPage" class="btn-nav">Próxima ▶</button>
        </div>
      </div>
      <div id="pageWrap" class="reader-content"></div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu hidden">
      <button class="context-item" data-action="mark-read">✓ Marcar como Lido</button>
      <button class="context-item" data-action="mark-unread">○ Marcar como Não Lido</button>
      <div class="context-divider"></div>
      <button class="context-item" data-action="download">⬇️ Baixar</button>
      <div class="context-divider"></div>
      <button class="context-item" data-action="tag">🏷️ Adicionar Tag</button>
      <button class="context-item" data-action="remove">🗑️ Remover</button>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2026 Manghu. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
